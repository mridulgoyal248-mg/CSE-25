<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netflix Homepage</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: white;
    }

    
    .ap dhillon {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background-color: #111;
    }

    .logo {
      color: red;
      font-size: 28px;
      font-weight: bold;
    }

    .nav-links a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    
    .hero {
      padding: 60px 40px;
      background: #111;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      max-width: 500px;
    }

    .hero button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: red;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

   
    .row {
      padding: 20px 40px;
    }

    .row h2 {
      margin-bottom: 10px;
    }

    .movies {
      display: flex;
      gap: 15px;
    }

    .movies img {
      width: 180px;
      border-radius: 5px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #111;
      color: gray;
    }
  </style>
</head>

<body>

  
  <div class="ap dhillon">
    <div class="logo">NETFLIX</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">TV Shows</a>
      <a href="#">Movies</a>
    </div>
  </div>

  
  <div class="hero">
    <h1>Unlimited movies, TV shows and more</h1>
    <p>Watch anywhere. Cancel anytime.</p>
    <button>Watch Now</button>
  </div>

  
  <div class="row">
    <h2>Popular on Netflix</h2>
    <div class="movies">
      <img src="https://via.placeholder.com/180x250">
      <img src="https://via.placeholder.com/180x250">
      <img src="https://via.placeholder.com/180x250">
      <img src="https://via.placeholder.com/180x250">
    </div>
  </div>

  <footer>
    <p>Netflix Clone Homepage | </p>
  </footer>

</body>
</html>
